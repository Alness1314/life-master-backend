#server configuration
server:
    port: ${PORT}
    #error:
        #include-stacktrace: never

#spring configuration
spring:
    application:
        name: LifeMaster

#image configuration size
    servlet: 
        multipart: 
            max-file-size: 10MB
            max-request-size: 10MB
#datasource
    datasource:
        url: ${DB_URL_NAME}
        username: ${DB_USERNAME}
        password: ${DB_PASSWORD}
        driver-class-name: org.postgresql.Driver
    jpa: 
        database-platform: org.hibernate.dialect.PostgreSQLDialect 
        show-sql: false
        hibernate: 
            ddl-auto: none # Opciones: create, create-drop, update, validate, none

    mail:
        host: ${EMAIL_HOST:smtp.gmail.com}
        port: ${EMAIL_PORT:587}
        username: ${EMAIL_USERNAME}
        password: ${EMAIL_PASSWORD}
        properties:
            mail:
                smtp:
                    auth: ${SMTP_AUTH:true}
                    starttls:
                        enable: ${SMTP_STARTTLS_ENABLE:true}
                        required: ${SMTP_STARTTLS_REQUIRE:true}
                    ssl:
                        enable: ${SMTP_SSL_ENABLE:false}
                        trust: ${SMTP_SSL_TRUST:smtp.gmail.com}
                    connectiontimeout: ${SMTP_CONNECTIONTIMEOUT:5000}
                    timeout: ${SMTP_TIMEOUT:5000}
                    writetimeout: ${SMTP_WRITETIMEOUT:5000}

#Open api swagger ui 
springdoc: 
    api-docs: 
        path: /api-docs
    swagger-ui:
        persist-authorization: true
        tags-sorter: alpha
        doc-expansion: list  # none | list | full

#prefix endpoints configuration
api:
    prefix: ${PREFIX} 

#secret jwt
jwt:
    secret: ${JWT_SECRET}

swg:
    server:
        url: ${SERVER_URL}
        description: ${SERVER_DESCRIPTION}


sys:
    user:
        password: ${DEFAULT_PASS}

email:
    from: ${EMAIL_USERNAME}